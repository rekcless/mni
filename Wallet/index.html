<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dompet Bulanan 💰</title>

  <style>
    body { background:#0f172a; color:#e6eef8; font-family:system-ui,Segoe UI,Roboto,Arial; padding:18px; margin:0; }
    h1 { color:#34d399; text-align:center; margin-bottom:20px; }
    .hidden { display:none; }
    .card { background:#071030; padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.5); margin-bottom:12px; }
    input, select { background:#0b1320; color:#e6eef8; border:1px solid rgba(255,255,255,0.1); padding:8px; border-radius:6px; width:100%; }
    button { cursor:pointer; background:#10b981; border:none; padding:10px 14px; border-radius:8px; color:#012; font-weight:bold; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
    th { color:#94a3b8; text-align:left; }
    .text-green { color:#34d399; }
    .text-red { color:#f87171; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; margin-top:12px; }
    .stat { background:#0b1320; padding:10px; border-radius:8px; text-align:center; }
  </style>
</head>
<body>
  <h1>💰 Dompet Bulanan</h1>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="card" style="max-width:480px;margin:auto;">
    <p>Masuk dulu biar datamu aman dan tersimpan di akun kamu 😎</p>
    <button id="loginBtn">Login dengan Google</button>
  </div>

  <!-- APP SECTION -->
  <div id="appSection" class="hidden" style="max-width:900px;margin:auto;">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
      <div>Halo, <b id="userName"></b> 👋</div>
      <button id="logoutBtn" style="background:#ef4444;color:#fff;">Logout</button>
    </div>

    <div class="card">
      <form id="transactionForm" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;">
        <input id="tanggal" type="date" required>
        <input id="keterangan" type="text" placeholder="Keterangan" required>
        <input id="jumlah" type="number" placeholder="Jumlah (Rp)" required>
        <select id="jenis" required>
          <option value="pemasukan">Pemasukan</option>
          <option value="pengeluaran">Pengeluaran</option>
        </select>
        <button type="submit" style="grid-column:1/-1;">Tambah Transaksi</button>
      </form>
    </div>

    <div class="grid">
      <div class="stat"><small>Pemasukan</small><div id="totalPemasukan">Rp0</div></div>
      <div class="stat"><small>Pengeluaran</small><div id="totalPengeluaran">Rp0</div></div>
      <div class="stat"><small>Saldo</small><div id="saldo">Rp0</div></div>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3>Daftar Transaksi</h3>
      <table>
        <thead>
          <tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th><th>Jenis</th></tr>
        </thead>
        <tbody id="transaksiList"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    // 🔥 Firebase config kamu
    const firebaseConfig = {
      apiKey: "AIzaSyASlBHqMbc3qegoqYx4pJieQrDgKNh-GA0",
      authDomain: "wallet-26246.firebaseapp.com",
      projectId: "wallet-26246",
      storageBucket: "wallet-26246.firebasestorage.app",
      messagingSenderId: "885423594769",
      appId: "1:885423594769:web:da035f279e0f1485a5c0b0",
      measurementId: "G-Q5ZH25EZT4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginSection = document.getElementById('loginSection');
    const appSection = document.getElementById('appSection');
    const userName = document.getElementById('userName');
    const form = document.getElementById('transactionForm');
    const list = document.getElementById('transaksiList');
    const totalIn = document.getElementById('totalPemasukan');
    const totalOut = document.getElementById('totalPengeluaran');
    const saldo = document.getElementById('saldo');

    // Login
    loginBtn.addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        alert("Login gagal: " + err.message);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      location.reload();
    });

    // Pantau auth state
    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginSection.classList.add('hidden');
        appSection.classList.remove('hidden');
        userName.textContent = user.displayName || user.email;
        loadTransactions(user.uid);
      } else {
        loginSection.classList.remove('hidden');
        appSection.classList.add('hidden');
      }
    });

    // Tambah transaksi
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const tanggal = form.tanggal.value;
      const keterangan = form.keterangan.value;
      const jumlah = parseFloat(form.jumlah.value || 0);
      const jenis = form.jenis.value;

      const currentUser = auth.currentUser;
      if (!currentUser) { alert("Silakan login dulu"); return; }

      const colRef = collection(db, "users", currentUser.uid, "transaksi");
      await addDoc(colRef, { tanggal, keterangan, jumlah, jenis, createdAt: serverTimestamp() });

      form.reset();
      loadTransactions(currentUser.uid);
    });

    // Load data
    async function loadTransactions(uid) {
      list.innerHTML = '';
      let totalMasuk = 0, totalKeluar = 0;

      const colRef = collection(db, "users", uid, "transaksi");
      const q = query(colRef, orderBy('createdAt', 'desc'));
      const snapshot = await getDocs(q);

      snapshot.forEach(doc => {
        const data = doc.data();
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${data.tanggal || '-'}</td>
          <td>${data.keterangan || '-'}</td>
          <td>Rp${(data.jumlah||0).toLocaleString()}</td>
          <td class="${data.jenis === 'pemasukan' ? 'text-green' : 'text-red'}">${data.jenis}</td>`;
        list.appendChild(tr);

        if (data.jenis === 'pemasukan') totalMasuk += data.jumlah || 0;
        else totalKeluar += data.jumlah || 0;
      });

      totalIn.textContent = "Rp" + totalMasuk.toLocaleString();
      totalOut.textContent = "Rp" + totalKeluar.toLocaleString();
      saldo.textContent = "Rp" + (totalMasuk - totalKeluar).toLocaleString();
    }
  </script>
</body>
</html>
