<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Wallet Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase (COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <h1>💰 Wallet Tracker</h1>
  <div id="saldo" class="positive">Rp 0</div>
</header>

<main>

  <!-- INPUT -->
  <section class="card">
    <h2>Tambah Transaksi</h2>
    <select id="type">
      <option value="income">Pemasukan</option>
      <option value="expense">Pengeluaran</option>
    </select>
    <input type="number" id="amount" placeholder="Nominal">
    <input type="text" id="note" placeholder="Keterangan">
    <button id="saveBtn">Simpan</button>
  </section>

  <!-- FILTER BULAN -->
  <section class="card">
    <h2>📆 Bulan</h2>
    <input type="month" id="monthFilter">
  </section>

  <!-- INSIGHT -->
  <section class="card">
    <h2>🧠 Insight</h2>
    <div id="insightBox" class="insight">Belum ada data</div>
  </section>

  <!-- TARGET -->
  <section class="card">
    <h2>🎯 Target Tabungan</h2>
    <input type="number" id="targetInput" placeholder="Target bulan ini">
    <button id="saveTarget">Simpan Target</button>

    <div class="progress">
      <div id="progressFill"></div>
    </div>
    <div id="progressText"></div>
  </section>

  <!-- GRAFIK -->
  <section class="card">
    <h2>📊 Grafik Bulanan</h2>
    <canvas id="chart"></canvas>
  </section>

  <!-- RIWAYAT -->
  <section class="card">
    <h2>Riwayat Transaksi</h2>
    <ul id="history"></ul>
  </section>

</main>

<footer>© 2026 Wallet App</footer>

<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
