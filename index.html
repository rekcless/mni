<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dompet Bulanan</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>💸 Dompet Bulanan</h1>

    <!-- LOGIN SECTION -->
    <div id="user-section">
      <button id="loginBtn" class="btn">Login dengan Google</button>
      <button id="logoutBtn" class="btn hidden">Logout</button>
      <p id="userName"></p>
    </div>

    <!-- FORM TRANSAKSI -->
    <form id="transaction-form" class="hidden">
      <div class="form-grid">
        <div class="form-group">
          <label for="keterangan">📝 Keterangan</label>
          <input type="text" id="keterangan" placeholder="Contoh: Gaji, Belanja..." required>
        </div>
        <div class="form-group">
          <label for="jumlah">💰 Jumlah (Rp)</label>
          <input type="number" id="jumlah" placeholder="Masukkan nominal..." required>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="tipe">📂 Jenis Transaksi</label>
          <select id="tipe">
            <option value="pemasukan">Pemasukan</option>
            <option value="pengeluaran">Pengeluaran</option>
          </select>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button type="submit" class="btn-green">+ Tambah Transaksi</button>
        </div>
      </div>
    </form>

    <!-- RINGKASAN -->
    <div id="summary" class="hidden">
      <h2>📊 Ringkasan Bulan Ini</h2>
      <p>Pemasukan: <span id="totalIn">Rp 0</span></p>
      <p>Pengeluaran: <span id="totalOut">Rp 0</span></p>
      <p><b>Saldo: <span id="saldo">Rp 0</span></b></p>
    </div>

    <!-- TABEL TRANSAKSI -->
    <table id="transactions" class="hidden">
      <thead>
        <tr>
          <th>Keterangan</th>
          <th>Jumlah</th>
          <th>Tipe</th>
          <th>Tanggal</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <footer>
    <p>💡 Dibuat dengan ❤️ oleh Wakied | Dompet Bulanan 2025</p>
  </footer>
</body>
</html>
