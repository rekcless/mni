
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dompet Bulanan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💸 Dompet Bulanan</h1>

    <div id="user-section">
      <button id="loginBtn" class="btn">Login dengan Google</button>
      <button id="logoutBtn" class="btn hidden">Logout</button>
      <p id="userName"></p>
    </div>

    <div id="filter-section" class="hidden">
      <label for="bulan">Pilih Bulan:</label>
      <select id="bulan"></select>
    </div>

    <form id="transaction-form" class="hidden">
      <input type="text" id="keterangan" placeholder="Keterangan..." required>
      <input type="number" id="jumlah" placeholder="Jumlah (Rp)" required>
      <select id="tipe">
        <option value="pemasukan">Pemasukan</option>
        <option value="pengeluaran">Pengeluaran</option>
      </select>
      <button type="submit" class="btn-green">Tambah</button>
    </form>

    <div id="summary" class="hidden">
      <h2>Ringkasan Bulanan</h2>
      <p>Pemasukan: <span id="totalIn">0</span></p>
      <p>Pengeluaran: <span id="totalOut">0</span></p>
      <p><b>Saldo: <span id="saldo">0</span></b></p>
    </div>

    <table id="transactions" class="hidden">
      <thead>
        <tr>
          <th>Keterangan</th>
          <th>Jumlah</th>
          <th>Tipe</th>
          <th>Tanggal</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <footer>
    © 2025 Dompet Bulanan | Dibuat dengan ❤️ oleh Wakied
  </footer>

  <script type="module" src="app.js" defer></script>
</body>
</html>
