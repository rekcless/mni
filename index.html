<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Wallet Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Chart.js (dipakai di app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>💰 Wallet Tracker</h1>
  <div id="saldo" class="positive">Rp 0</div>
</header>

<main>

  <!-- INPUT -->
  <section class="card">
    <h2>Tambah Transaksi</h2>
    <select id="type">
      <option value="income">Pemasukan</option>
      <option value="expense">Pengeluaran</option>
    </select>
    <input type="number" id="amount" placeholder="Nominal">
    <input type="text" id="note" placeholder="Keterangan">
    <button id="saveBtn">Simpan</button>
  </section>

  <!-- FILTER BULAN -->
  <section class="card">
    <h2>📆 Bulan</h2>
    <input type="month" id="monthFilter">
  </section>

  <!-- INSIGHT -->
  <section class="card">
    <h2>🧠 Insight Keuangan</h2>
    <div id="insightBox" class="insight"></div>
  </section>

  <!-- TARGET TABUNGAN -->
  <section class="card">
    <h2>🎯 Target Tabungan Bulan Ini</h2>
    <input type="number" id="targetInput" placeholder="Target (Rp)">
    <button id="saveTarget">Simpan Target</button>

    <div class="progress-box">
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
      <div id="progressText"></div>
    </div>
  </section>

  <!-- GRAFIK -->
  <section class="card">
    <h2>📊 Grafik Bulanan</h2>
    <canvas id="chart"></canvas>
  </section>

  <!-- RIWAYAT -->
  <section class="card">
    <h2>Riwayat Transaksi</h2>
    <ul id="history"></ul>
  </section>

</main>

<footer>© 2026 Wallet App</footer>

<!-- 🔥 WAJIB PAKAI MODULE -->
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
