<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengeluaran Hari Ini</title>
    <style>
        /* CSS Reset & Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
            background-color: #F5EFE6; /* Krem */
            color: #333333; /* Abu-abu tua untuk teks */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        /* Palet Warna */
        :root {
            --hijau-tua: #588157;
            --hijau-muda: #A3B18A;
            --krem: #F5EFE6;
            --putih-gading: #FDFDF0;
            --abu-abu: #DAD7CD;
            --abu-teks: #495057;
        }

        /* Container Utama */
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--putih-gading);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--hijau-tua);
            color: var(--krem);
            padding: 25px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        #tanggal-hari-ini {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--krem);
            opacity: 0.9;
        }

        /* Main Content */
        main {
            padding: 30px;
        }

        /* Box Total */
        .total-box {
            background-color: var(--hijau-muda);
            color: var(--putih-gading);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
        }

        .total-box h2 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #total-pengeluaran {
            font-size: 2.5rem;
            font-weight: 700;
        }

        /* Form Input */
        #form-pengeluaran {
            margin-bottom: 30px;
        }

        .form-grup {
            margin-bottom: 15px;
        }

        .form-grup label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--abu-teks);
        }

        .form-grup input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--abu-abu);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #FFF;
        }

        .form-grup input:focus {
            outline: none;
            border-color: var(--hijau-muda);
            box-shadow: 0 0 0 3px rgba(163, 177, 138, 0.3);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background-color: var(--hijau-tua);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button[type="submit"]:hover {
            background-color: #4a6f4a;
        }

        /* Daftar Pengeluaran */
        .list-pengeluaran h3 {
            font-size: 1.3rem;
            color: var(--abu-teks);
            border-bottom: 2px solid var(--abu-abu);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        #daftar-list {
            list-style-type: none;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid var(--abu-abu);
            font-size: 1.1rem;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item .deskripsi {
            font-weight: 500;
            color: #333;
        }

        .list-item .jumlah {
            font-weight: 600;
            color: var(--hijau-tua);
        }

        #pesan-kosong {
            text-align: center;
            padding: 20px;
            color: var(--abu-teks);
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Pengeluaran Hari Ini</h1>
            <p id="tanggal-hari-ini"></p>
        </header>

        <main>
            <div class="total-box">
                <h2>Total Hari Ini:</h2>
                <span id="total-pengeluaran">Rp 0</span>
            </div>

            <form id="form-pengeluaran">
                <div class="form-grup">
                    <label for="deskripsi">Deskripsi Pengeluaran</label>
                    <input type="text" id="deskripsi" placeholder="Cth: Kopi susu" required>
                </div>
                <div class="form-grup">
                    <label for="jumlah">Jumlah (Rp)</label>
                    <input type="number" id="jumlah" placeholder="Cth: 25000" min="0" required>
                </div>
                <button type="submit">Tambah</button>
            </form>

            <section class="list-pengeluaran">
                <h3>Daftar Pengeluaran</h3>
                <ul id="daftar-list">
                    </ul>
                <p id="pesan-kosong">Belum ada pengeluaran.</p>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tanggalEl = document.getElementById('tanggal-hari-ini');
            const form = document.getElementById('form-pengeluaran');
            const inputDeskripsi = document.getElementById('deskripsi');
            const inputJumlah = document.getElementById('jumlah');
            const totalEl = document.getElementById('total-pengeluaran');
            const daftarListEl = document.getElementById('daftar-list');
            const pesanKosongEl = document.getElementById('pesan-kosong');

            // --- Atur Tanggal Hari Ini ---
            const hariIni = new Date();
            const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
            tanggalEl.textContent = hariIni.toLocaleDateString('id-ID', opsiTanggal);

            // Kunci untuk localStorage (berdasarkan tanggal)
            const storageKey = `pengeluaran_${hariIni.toISOString().split('T')[0]}`;

            // --- Ambil Data dari localStorage ---
            let pengeluaran = JSON.parse(localStorage.getItem(storageKey)) || [];

            // --- Fungsi untuk Format Mata Uang (Rupiah) ---
            function formatRupiah(angka) {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0
                }).format(angka);
            }

            // --- Fungsi untuk Menampilkan Data ke List ---
            function renderPengeluaran() {
                // Kosongkan list
                daftarListEl.innerHTML = '';

                if (pengeluaran.length === 0) {
                    pesanKosongEl.style.display = 'block';
                } else {
                    pesanKosongEl.style.display = 'none';
                    pengeluaran.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'list-item';
                        li.innerHTML = `
                            <span class="deskripsi">${item.deskripsi}</span>
                            <span class="jumlah">${formatRupiah(item.jumlah)}</span>
                        `;
                        daftarListEl.appendChild(li);
                    });
                }

                // Update total
                updateTotal();
            }

            // --- Fungsi untuk Update Total ---
            function updateTotal() {
                const total = pengeluaran.reduce((acc, item) => acc + item.jumlah, 0);
                totalEl.textContent = formatRupiah(total);
            }

            // --- Fungsi untuk Simpan ke localStorage ---
            function simpanData() {
                localStorage.setItem(storageKey, JSON.stringify(pengeluaran));
            }

            // --- Event Listener untuk Form Submit ---
            form.addEventListener('submit', (e) => {
                e.preventDefault(); // Mencegah halaman reload

                const deskripsi = inputDeskripsi.value;
                const jumlah = parseInt(inputJumlah.value);

                if (deskripsi.trim() === '' || isNaN(jumlah) || jumlah <= 0) {
                    alert('Isi deskripsi dan jumlah dengan benar!');
                    return;
                }

                // Tambah ke array
                const itemBaru = {
                    id: Date.now(), // ID unik
                    deskripsi: deskripsi,
                    jumlah: jumlah
                };
                pengeluaran.push(itemBaru);

                // Simpan & Render ulang
                simpanData();
                renderPengeluaran();

                // Reset form
                inputDeskripsi.value = '';
                inputJumlah.value = '';
                inputDeskripsi.focus();
            });

            // --- Tampilkan data saat pertama kali load ---
            renderPengeluaran();
        });
    </script>

</body>
</html>
